global:
  scrape_interval: 5s # Каждые 5 секунд опрашиваем сервер, чтобы графики обновлялись мгновенно
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'go-api-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['app:8082'] # Строго имя нашего Go-контейнера и его порт